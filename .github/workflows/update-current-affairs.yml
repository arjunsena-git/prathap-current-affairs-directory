name: Update current affairs

on:
  schedule:
    # 00:30 UTC = 06:00 IST
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: current-affairs-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate current affairs page
        run: python scripts/scrape_current_affairs.py --verbose

      - name: Commit and push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/current_affairs_cache.json
          if git diff --cached --quiet; then
            echo "No current affairs changes to commit."
          else
            git commit -m "Update current affairs digest"
            git push
          fi
